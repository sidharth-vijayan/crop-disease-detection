name: crop_disease_ews
description: AI-Based Crop Disease Early Warning System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # HTTP
  http: ^1.2.0
  dio: ^5.4.0

  # Supabase
  supabase_flutter: ^2.0.0

  # Camera & Image
  image_picker: ^1.0.7
  camera: ^0.10.5
  cached_network_image: ^3.3.1

  # Location
  geolocator: ^11.0.0
  geocoding: ^3.0.0

  # Charts
  fl_chart: ^0.67.0

  # Storage / Cache
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.2

  # Notifications
  flutter_local_notifications: ^17.0.0
  workmanager: ^0.6.0

  # State management
  provider: ^6.1.2
  flutter_riverpod: ^2.5.1

  # UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10
  lottie: ^3.1.0
  shimmer: ^3.0.0
  percent_indicator: ^4.2.3
  fl_country_code_picker: ^0.1.9

  # Internationalisation
  intl: ^0.20.2

  # Utils
  connectivity_plus: ^6.0.3
  permission_handler: ^11.3.0
  url_launcher: ^6.2.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/lottie/
    - assets/icons/
